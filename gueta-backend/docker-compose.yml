services:
  db:
    image: postgres:16-alpine
    container_name: gueta-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gueta
      POSTGRES_PASSWORD: gueta
      POSTGRES_DB: gueta
    ports:
      - "5432:5432"
    volumes:
      - gueta-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gueta -d gueta"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gueta-db-data:
